<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="author" content="Doug Issichopoulos" />
  <meta name="description" content="Need help solving the daily Wordle puzzle? This free tool can help!" />
  <title>Wordle Helper</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Boostrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

<body>

  <div class="container-fluid" id="header">
    <div class="row align-items-center">
      <div class="col-2">
        Created by: <a href="https://www.dougissi.com">dougissi.com</a>
      </div>
      <div class="col-8 text-center">
        <h1>Wordle Helper</h1>
      </div>
      <div class="col-2">
        <div class="row">
          <a href="https://www.powerlanguage.co.uk/wordle/">Wordle</a>
        </div>
        <div class="row">
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfKeTZCnnicWaVnn0PpGWvUjZvjrXeA7rx1wZUKCNnJJbIthA/viewform?usp=sf_link">Submit Feedback</a>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid" id="main-content">
    <div class="row">
      <div class="col-lg-6" id="word-selector">
        <h2>Select a Word</h2>
        <div class="top-word-suggestions">
          <h5>Top Word Suggestions</h5>
        </div>
        <div class="all-valid-words">
          <h5>Remaining Possible Answers</h5>
          <p id="num-valid-words"></p>
          <div class="valid-words-box">
          </div>
        </div>
      </div>
      <div class="col-lg-6" id="guesses">
        <h2>Evaluate Guesses</h2>
        <div class="letter-tiles-grid">
        </div>
        <div class="letter-color-selectors">
        </div>
      </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <form class="hidden-form" id="guess-result-form" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSf_qogYPKORE_gsr_--EXVx_sHYR3UFZkI63bVA1uWKlGRQiQ/formResponse" method="post" target="hidden_iframe">
      <label>Client IP</label>
      <input type="text" id="guess-form-client-ip" name="entry.1967571849"></input>
      <label>Round</label>
      <input type="text" id="guess-form-round" name="entry.635969451">
      <label>Guess</label>
      <input type="text" id="guess-form-guess-word" name="entry.670924862">
      <label>Result</label>
      <input type="text" id="guess-form-result" name="entry.566640870">
      <label>Source</label>
      <input type="text" id="guess-form-source" name="entry.981218756">
      <button type="submit" id="guess-form-submit-button">Send</button>
    </form>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="assets/original_valid_words.js" charset="utf-8"></script>
  <script src="assets/wordle_valid_words.js" charset="utf-8"></script>
  <script src="solver.js" charset="utf-8"></script>
</body>

</html>
